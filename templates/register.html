    <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <div class="form-container">
        <h2>Создать аккаунт</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Придумайте логин" required><br><br>
            <input type="password" name="password" placeholder="Придумайте пароль" required><br><br>
            <button type="submit">Зарегистрироваться</button>
        </form>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <p><a href="{{ url_for('simple_page.login') }}">Уже есть аккаунт? Войти</a></p>
    </div>
</body>
</html>
