{% extends "layout.html" %}

{% block content %}
    <h2>Авторизация</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Логин"><br><br>
        <input type="password" name="password" placeholder="Пароль"><br><br>
        <button type="submit">Войти</button>
    </form>
    <p><a href="{{ url_for('simple_page.register') }}">Еще нет аккаунта?</a></p>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <div style="margin-top: 50px; color: gray;">
        <p>Подсказка: попробуй ввести в логин: ' OR '1'='1</p>
    </div>
{% endblock %}
