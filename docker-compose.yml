version: "3.8"

services:
  backend:
    build: ./backend
    container_name: flask_api
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=SQLi.db
      - SECRET_KEY=super-secret-key-for-mentor

  frontend:
    build: ./frontend
    container_name: vue_app
    ports:
      - "80:80"
    depends_on:
      - backend
